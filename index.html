  <script src="/_sdk/719055fef2a85d14.editing_sdk.js" integrity="sha512-kFqrdGgIiTOsu307feB5Cy3JVP9IayftsmCIZ0csxYBGuBmJQPhyvcnmKR8F0fTW97h5s1gAvz3SumI8zJ6OxQ=="></script>
  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRxScPejqvtdauHJLYvJ1A1mNevrn4aQ_4YxquSkvu6Rx-Y4BTjAUVr7ByQIpXY5RvaYEUa53_nDBkB/pub?gid=0&single=true&output=csv";

    const state = {
      headers: [],
      rows: [],
      query: "",
      loading: false
    };

    const elements = {
      loading: document.getElementById("loading-state"),
      error: document.getElementById("error-state"),
      empty: document.getElementById("empty-state"),
      noResults: document.getElementById("no-results-state"),
      table: document.getElementById("table-state"),
      head: document.getElementById("table-head"),
      body: document.getElementById("table-body"),
      search: document.getElementById("table-search"),
      reload: document.getElementById("reload-button"),
      retry: document.getElementById("retry-button"),
      statusText: document.getElementById("status-text"),
      statusIcon: document.getElementById("status-icon"),
      summary: document.getElementById("row-summary")
    };

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let field = "";
      let quoted = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (quoted && next === '"') {
            field += '"';
            i++;
          } else {
            quoted = !quoted;
          }
        } else if (char === "," && !quoted) {
          row.push(field.trim());
          field = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") i++;
          row.push(field.trim());
          if (row.some(cell => cell !== "")) rows.push(row);
          row = [];
          field = "";
        } else {
          field += char;
        }
      }

      row.push(field.trim());
      if (row.some(cell => cell !== "")) rows.push(row);
      return rows;
    }

    function setView(view) {
      ["loading", "error", "empty", "noResults", "table"].forEach(name => {
        const node = elements[name];
        node.classList.toggle("hidden", name !== view);
        if (["error", "empty", "noResults"].includes(name)) {
          node.classList.toggle("flex", name === view);
        }
      });
    }

    function setStatus(type, text) {
      elements.statusText.textContent = text;
      const iconMap = {
        loading: ["loader-circle", "bg-amber-100", "text-amber-700", true],
        success: ["circle-check", "bg-emerald-100", "text-emerald-700", false],
        error: ["circle-alert", "bg-red-100", "text-red-700", false]
      };
      const [icon, bg, color, spin] = iconMap[type];

      elements.statusIcon.className = `flex h-9 w-9 shrink-0 items-center justify-center rounded-full ${bg} ${color}`;
      elements.statusIcon.innerHTML = `<i data-lucide="${icon}" class="h-4 w-4 ${spin ? "animate-spin" : ""}"></i>`;
      lucide.createIcons();
    }

    function createCell(tag, content) {
      const cell = document.createElement(tag);
      cell.textContent = content;
      return cell;
    }

    function renderHeader() {
      elements.head.replaceChildren();
      const headerRow = document.createElement("tr");

      state.headers.forEach((header, index) => {
        headerRow.appendChild(createCell("th", header || `Kolom ${index + 1}`));
      });

      elements.head.appendChild(headerRow);
    }

    function filteredRows() {
      if (!state.query) return state.rows;
      const query = state.query.toLocaleLowerCase("id-ID");
      return state.rows.filter(row =>
        row.some(cell => String(cell).toLocaleLowerCase("id-ID").includes(query))
      );
    }

    function renderRows() {
      const rows = filteredRows();
      elements.body.replaceChildren();

      if (state.rows.length === 0) {
        setView("empty");
        elements.summary.textContent = "0 baris ditampilkan";
        return;
      }

      if (rows.length === 0) {
        setView("noResults");
        elements.summary.textContent = "0 hasil ditemukan";
        return;
      }

      const fragment = document.createDocumentFragment();
      rows.forEach(row => {
        const tr = document.createElement("tr");
        state.headers.forEach((_, index) => {
          tr.appendChild(createCell("td", row[index] ?? ""));
        });
        fragment.appendChild(tr);
      });

      elements.body.appendChild(fragment);
      elements.summary.textContent = state.query
        ? `${rows.length} dari ${state.rows.length} baris cocok`
        : `${rows.length} baris ditampilkan`;
      setView("table");
    }

    async function loadData() {
      if (state.loading) return;
      state.loading = true;
      elements.reload.disabled = true;
      elements.retry.disabled = true;
      setView("loading");
      setStatus("loading", "Mengambil data terbaru…");

      try {
        const requestUrl = `${CSV_URL}&_=${Date.now()}`;
        const response = await fetch(requestUrl, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Spreadsheet tidak dapat diakses.");
        }

        const text = await response.text();
        const parsed = parseCSV(text);

        if (parsed.length === 0) {
          state.headers = [];
          state.rows = [];
          setStatus("success", "Spreadsheet terhubung, tetapi belum berisi data");
          setView("empty");
          return;
        }

        const width = Math.max(...parsed.map(row => row.length));
        state.headers = Array.from({ length: width }, (_, index) =>
          parsed[0][index] || `Kolom ${index + 1}`
        );
        state.rows = parsed.slice(1).map(row =>
          Array.from({ length: width }, (_, index) => row[index] ?? "")
        );

        renderHeader();
        renderRows();

        const formattedTime = new Intl.DateTimeFormat("id-ID", {
          hour: "2-digit",
          minute: "2-digit"
        }).format(new Date());

        setStatus("success", `Tersinkron pada ${formattedTime}`);
      } catch (error) {
